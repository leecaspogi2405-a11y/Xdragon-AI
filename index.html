<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xdragon 3D Arcade Prototype</title>
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            z-index: 10;
            display: flex;
            gap: 20px;
            background: rgba(30,30,30,0.85);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #ff4757;
        }
        #threejs-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div>Score: <span id="score-val">0</span></div>
        <div>Controls: Use A / D or Left / Right Arrows</div>
    </div>

    <div id="threejs-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. CORE SETUP SETUP ENGINE CONFIGURATION ---
        const container = document.getElementById('threejs-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x121212);
        scene.fog = new THREE.FogExp2(0x121212, 0.015); // Adds a smooth depth fog atmosphere

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- 2. GAME VARIABLES & GROUND WORK STRUCTURE ---
        let score = 0;
        let gameRunning = true;
        let obstacles = [];
        const laneWidth = 4;

        // Add Ambient & Directional Neon Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xff4757, 0.8);
        directionalLight.position.set(0, 10, 5);
        scene.add(directionalLight);

        // Create 3D Track Run Way Plane (Ground grid)
        const trackGeometry = new THREE.PlaneGeometry(14, 500);
        const trackMaterial = new THREE.MeshBasicMaterial({ color: 0x1e1e1e, side: THREE.DoubleSide });
        const track = new THREE.Mesh(trackGeometry, trackMaterial);
        track.rotation.x = Math.PI / 2; // Lay flat
        track.position.z = -200;
        scene.add(track);

        // Grid overlay helper line indicator grid map
        const gridHelper = new THREE.GridHelper(500, 100, 0xff4757, 0x444444);
        gridHelper.position.y = 0.01;
        gridHelper.position.z = -200;
        scene.add(gridHelper);

        // --- 3. CREATE PLAYER ELEMENT (A Neon 3D Sphere Core) ---
        const playerGeometry = new THREE.SphereGeometry(1, 32, 32);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00a8ff, roughness: 0.2, metalness: 0.5 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.set(0, 1, -5); // Position slightly above the grid map runway track
        scene.add(player);

        // Camera Tracking Profile Offset Viewpoint LookAt Position Setup
        camera.position.set(0, 6, 3);
        camera.lookAt(player.position.x, player.position.y + 1, player.position.z - 5);

        // --- 4. PLAYER MOVEMENT MECHANICS EVENT TRACKERS ---
        let inputDirection = 0;
        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'ArrowLeft') inputDirection = -0.15;
            if (e.key === 'd' || e.key === 'ArrowRight') inputDirection = 0.15;
        });
        window.addEventListener('keyup', () => inputDirection = 0);

        // --- 5. ENEMY OBSTACLE INJECTION VECTOR MECHANICS ---
        function spawnLaserWall() {
            if(!gameRunning) return;
            const width = Math.random() * 4 + 2;
            const obstacleGeometry = new THREE.BoxGeometry(width, 0.8, 1);
            const obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xff4757, emissive: 0xff4757, emissiveIntensity: 0.5 });
            const obsMesh = new THREE.Mesh(obstacleGeometry, obstacleMaterial);

            // Choose random placement vector
            obsMesh.position.set((Math.random() - 0.5) * 10, 0.4, -150);
            scene.add(obsMesh);
            obstacles.push(obsMesh);

            // Re-call execution queue recursively with slight variability
            setTimeout(spawnLaserWall, Math.max(400, 1500 - score * 2));
        }
        spawnLaserWall();

        // --- 6. REAL-TIME RENDER MECHANICS INTERACTION MATRIX ---
        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);

            // Handle player tracking frame steps boundary limits
            player.position.x += inputDirection;
            if (player.position.x > 6) player.position.x = 6;
            if (player.position.x < -6) player.position.x = -6;

            // Track continuous linear progression parameters
            score++;
            document.getElementById('score-val').innerText = score;

            // Update & Move 3D Obstacle Elements Towards Player camera view field
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += 1.2 + (score * 0.0005); // Speed multiplier upscaling smoothly

                // Box Intersect Bounding Processing Check (Collision Evaluator Core Logic Matrix)
                let playerBox = new THREE.Box3().setFromObject(player);
                let obsBox = new THREE.Box3().setFromObject(obs);

                if (playerBox.intersectsBox(obsBox)) {
                    gameRunning = false;
                    alert(`💥 CRASHED AT A DISTANCE OF: ${score} POINTS!`);
                    location.reload(); // Reload script array back to pristine base vector defaults
                }

                // Cleanup meshes when they slide safely past camera clipping bounds
                if (obs.position.z > 10) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        // Dynamically Handle Screen/Viewport Scaling Resizes instantly
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
