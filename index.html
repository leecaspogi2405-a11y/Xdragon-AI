    <script>
        // Password configuration
        const passPart1 = "Xdragonofficial558724050990";
        const passPart2 = ".Real Account";
        const MY_PASSWORD = passPart1 + passPart2; 

        function checkPassword() {
            const enteredPass = document.getElementById("pass-input").value;
            const errorMsg = document.getElementById("login-error");
            
            if(enteredPass === MY_PASSWORD) {
                document.getElementById("login-overlay").style.display = "none";
                
                if (!localStorage.getItem("gemini_api_key")) {
                    document.getElementById("key-overlay").style.display = "flex";
                } else {
                    launchMainInterface();
                }
            } else {
                errorMsg.style.display = "block";
                document.getElementById("pass-input").value = "";
            }
        }

        function saveApiKey() {
            const keyVal = document.getElementById("key-input").value.trim();
            if (keyVal.startsWith("AIzaSy")) {
                localStorage.setItem("gemini_api_key", keyVal);
                document.getElementById("key-overlay").style.display = "none";
                launchMainInterface();
            } else {
                alert("Invalid format! Gemini keys usually start with 'AIzaSy'.");
            }
        }

        function launchMainInterface() {
            document.getElementById("chat-container").style.display = "flex";
            document.getElementById("input-container").style.display = "flex";
        }

        const SYSTEM_INSTRUCTION = "You are Xdragon-AI, a cool, hype, and witty AI companion. Speak entirely in English. You love gaming, meme culture, programming, and tech. Use emojis like 🐉, 🔥, 💀, or 🚀.";

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const chatContainer = document.getElementById("chat-container");
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            appendMessage(messageText, "user-message");
            inputField.value = "";

            const loadingDiv = appendMessage("Dragon is thinking...", "ai-message");

            const activeKey = localStorage.getItem("gemini_api_key");
            const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeKey}`;

            try {
                const response = await fetch(targetUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${SYSTEM_INSTRUCTION}\n\nUser says: ${messageText}` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    loadingDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    // IF IT FAILS: Clear the bad key so the user can enter a new one next reload!
                    localStorage.removeItem("gemini_api_key");
                    loadingDiv.innerText = `API Error! The key saved was invalid or blocked. Refresh the page to enter a fresh key.\n\nDetails: ${data.error ? data.error.message : "Unknown verification error."}`;
                }

            } catch (error) {
                loadingDiv.innerText = "Network pipeline error! Verify active web configurations.";
            }

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendMessage(text, className) {
            const chatContainer = document.getElementById("chat-container");
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }
    </script>
